# ============================================
# Docker Compose — Full Stack
# Backend (FastAPI) + Frontend (Next.js)
# ============================================
version: "3.9"

services:
  # ── FastAPI Backend ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medipredict-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - MLFLOW_TRACKING_URI=mlruns
    volumes:
      - ./saved_models:/app/saved_models:ro
      - ./mlruns:/app/mlruns
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    container_name: medipredict-web
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
